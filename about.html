<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Our Firm | JUSTICE FIRST LAW ASSOCIATES</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Nastaliq+Urdu:wght@400;700&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: {
                            950: "#050B16",
                            900: "#0A1931",
                            800: "#1A1A2E",
                            700: "#1B3A6B",
                        },
                        gold: {
                            600: "#B89640",
                            500: "#C9A84C",
                            400: "#D4B96E",
                            300: "#E2B96F",
                        }
                    },
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        sans: ['"Inter"', 'sans-serif'],
                        urdu: ['"Noto Nastaliq Urdu"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        html, body { 
            background-color: #F8F7F4; 
            color: #1A1A2E; 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            width: 100%;
        }
        
        .urdu-text {
            font-family: 'Noto Nastaliq Urdu', sans-serif;
            direction: rtl;
            text-align: right;
            line-height: 2.5;
            padding-top: 0.5em;
            padding-bottom: 0.5em;
            display: block;
        }

        .hero-premium {
            background: linear-gradient(135deg, #0A1931 0%, #050B16 100%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="bg-navy-950 border-b border-white/10 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <a href="index.html" class="flex items-center space-x-3 group">
                    <div id="siteLogoNavContainer" class="w-10 h-10 bg-gold-500 rounded flex items-center justify-center overflow-hidden shadow-lg">
                        <img id="siteLogoNav" src="" alt="Logo" class="max-w-full max-h-full object-contain hidden">
                        <svg id="defaultLogoNav" class="w-6 h-6 text-navy-900" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3zm6.82 10.31L12 17l-6.82-3.69v-3.13L12 13.5l6.82-3.19v3z"/></svg>
                    </div>
                    <div class="flex flex-col min-w-0">
                        <span id="siteNameEnNav" class="font-serif text-lg font-bold text-white tracking-wide uppercase truncate">Justice First</span>
                        <span id="siteNameUrNav" class="text-[8px] uppercase tracking-[0.2em] text-gold-400 font-bold leading-tight truncate">Law Associates</span>
                    </div>
                </a>
                <div class="hidden lg:flex items-center space-x-10">
                    <a href="index.html" class="text-gray-300 hover:text-gold-500 font-medium text-sm uppercase tracking-widest transition-colors">Home</a>
                    <a href="about.html" class="text-gold-500 font-bold text-sm uppercase tracking-widest border-b-2 border-gold-500 pb-1">About</a>
                    <a href="services.html" class="text-gray-300 hover:text-gold-500 font-medium text-sm uppercase tracking-widest transition-colors">Services</a>
                    <a href="team.html" class="text-gray-300 hover:text-gold-500 font-medium text-sm uppercase tracking-widest transition-colors">Team</a>
                    <a href="contact.html" class="bg-gold-500 text-navy-900 px-6 py-2 rounded-full font-bold text-xs uppercase tracking-widest hover:bg-white transition-all shadow-lg">Consultation</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Subpage Hero -->
    <header class="hero-premium py-12 md:py-24 px-4 relative overflow-hidden">
        <div class="absolute top-0 right-0 w-64 h-64 bg-gold-500/10 rounded-full blur-[100px] -mr-32 -mt-32"></div>
        <div class="max-w-7xl mx-auto w-full text-center relative z-10">
            <h1 id="aboutTitleEn" class="text-3xl md:text-5xl lg:text-7xl font-serif text-white font-bold mb-6">About Our Firm</h1>
            <p id="aboutTitleUr" class="urdu-text text-2xl md:text-3xl lg:text-4xl text-gold-400"></p>
        </div>
    </header>

    <!-- Professional Story Section -->
    <section class="py-20 px-4 max-w-7xl mx-auto w-full">
        <div class="grid lg:grid-cols-2 gap-24 items-start">
            <div class="space-y-12">
                <div class="relative">
                    <div class="absolute -left-8 top-0 w-2 h-full bg-gold-500 hidden md:block"></div>
                    <h2 class="text-3xl md:text-5xl font-serif text-navy-900 font-bold mb-8">A Legacy of Excellence</h2>
                    <p id="aboutStoryEn" class="text-lg md:text-xl text-gray-700 leading-relaxed font-light"></p>
                </div>
                
                <div id="aboutStoryUr" class="urdu-text text-2xl md:text-3xl text-gray-800 bg-white p-6 md:p-10 rounded-3xl shadow-xl border-r-8 border-gold-500 leading-relaxed"></div>
            </div>

            <div class="space-y-12">
                <div class="relative group">
                    <div class="absolute -inset-4 border-2 border-gold-500/20 rounded-3xl transform rotate-2"></div>
                    <img id="aboutImgPreview" src="" alt="Firm Story" class="relative rounded-2xl shadow-2xl w-full aspect-[4/3] object-cover border-8 border-white">
                </div>

                <div class="grid sm:grid-cols-2 gap-8">
                    <div class="bg-navy-900 text-white p-8 rounded-2xl shadow-xl">
                        <h4 class="text-gold-500 font-bold uppercase tracking-widest text-xs mb-4">Our Mission</h4>
                        <p id="aboutMission" class="text-gray-300 leading-relaxed"></p>
                    </div>
                    <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
                        <h4 class="text-navy-900 font-bold uppercase tracking-widest text-xs mb-4">Our Vision</h4>
                        <p id="aboutVision" class="text-gray-600 leading-relaxed"></p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-navy-950 text-white py-12 md:py-16 px-4 border-t border-white/5">
        <div class="max-w-7xl mx-auto w-full grid grid-cols-1 md:grid-cols-3 gap-12 md:gap-16 text-center md:text-left">
            <div>
                <h3 class="font-serif text-3xl text-gold-500 mb-8 tracking-wide flex items-center space-x-3">
                    <div id="siteLogoFooterContainer" class="w-10 h-10 bg-gold-500 rounded flex items-center justify-center overflow-hidden">
                        <img id="siteLogoFooter" src="" alt="Logo" class="max-w-full max-h-full object-contain hidden">
                        <svg id="defaultLogoFooter" class="w-6 h-6 text-navy-900" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3zm6.82 10.31L12 17l-6.82-3.69v-3.13L12 13.5l6.82-3.19v3z"/></svg>
                    </div>
                    <div class="flex flex-col text-left">
                        <span id="siteNameEnFooter" class="text-xl font-bold text-white uppercase leading-none">Justice First</span>
                        <span id="siteNameUrFooter" class="text-[8px] uppercase tracking-[0.2em] text-gold-400 font-bold mt-1">Law Associates</span>
                    </div>
                </h3>
                <p id="footerCopyrightEl" class="text-gray-400 text-sm">© 2024 Justice First Law Associates. All Rights Reserved.</p>
            </div>
            <div>
                <h4 class="text-white font-bold uppercase tracking-widest text-xs mb-8">Navigation</h4>
                <div class="flex flex-wrap justify-center md:justify-start gap-6 text-gray-400">
                    <a href="index.html" class="hover:text-gold-500 transition-colors">Home</a>
                    <a href="services.html" class="hover:text-gold-500 transition-colors">Services</a>
                    <a href="team.html" class="hover:text-gold-500 transition-colors">Team</a>
                </div>
            </div>
            <div>
                <h4 class="text-white font-bold uppercase tracking-widest text-xs mb-8">Office</h4>
                <p id="footerAddress" class="text-gray-400 text-sm leading-relaxed"></p>
                <p id="footerPhone" class="text-gold-500 font-bold mt-4"></p>
            </div>
        </div>
    </footer>

    <!-- Fresh WhatsApp Button -->
    <a href="#" id="waLink" target="_blank" class="fixed bottom-8 right-8 bg-[#25D366] text-white p-4 rounded-full shadow-2xl hover:scale-110 transition-all z-50 group">
        <div class="absolute -top-12 right-0 bg-white text-navy-900 text-xs font-bold px-4 py-2 rounded-xl shadow-2xl opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none whitespace-nowrap border border-gray-100 uppercase tracking-widest">
            Chat with Experts
        </div>
        <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
    </a>

    <script>
        const defaultDb = {
            aboutTitleEn: "About Our Firm",
            aboutTitleUr: "فرم کے بارے میں",
            aboutStoryEn: "",
            aboutStoryUr: "",
            aboutMission: "",
            aboutVision: "",
            aboutImage: "",
            contactAddress: "",
            contactWhatsApp: "",
            footerCopyright: ""
        };

        document.addEventListener('DOMContentLoaded', async () => {
            let savedData = JSON.parse(localStorage.getItem('justiceFirstDataV2')) || {};
            try {
                const res = await fetch('data.json');
                const fetchedData = await res.json();
                if (fetchedData && Object.keys(fetchedData).length > 0) {
                    savedData = fetchedData;
                    localStorage.setItem('justiceFirstDataV2', JSON.stringify(fetchedData));
                }
            } catch (e) { console.error('Fetch error:', e); }
            const data = { ...defaultDb, ...savedData };
            
            if(data) {
                const setText = (id, text) => { 
                    const el = document.getElementById(id);
                    if (el) el.innerText = text || ''; 
                };
                const setHtml = (id, html) => { 
                    const el = document.getElementById(id);
                    if (el) el.innerHTML = html || ''; 
                };
                const checkUrdu = (id) => {
                    const el = document.getElementById(id);
                    if (el && !el.innerText.trim()) el.style.display = 'none';
                    else if (el) el.style.display = 'block';
                };
                
                setText('aboutTitleEn', data.aboutTitleEn);
                setHtml('aboutTitleUr', data.aboutTitleUr);
                setText('aboutStoryEn', data.aboutStoryEn);
                setHtml('aboutStoryUr', data.aboutStoryUr);
                checkUrdu('aboutTitleUr');
                checkUrdu('aboutStoryUr');
                setText('aboutMission', data.aboutMission);
                setText('aboutVision', data.aboutVision);
                if(data.aboutImage) document.getElementById('aboutImgPreview').src = data.aboutImage;
                
                if(data.siteLogo) {
                    const navLogo = document.getElementById('siteLogoNav');
                    const footerLogo = document.getElementById('siteLogoFooter');
                    const defNav = document.getElementById('defaultLogoNav');
                    const defFooter = document.getElementById('defaultLogoFooter');
                    if(navLogo) { navLogo.src = data.siteLogo; navLogo.classList.remove('hidden'); if(defNav) defNav.classList.add('hidden'); }
                    if(footerLogo) { footerLogo.src = data.siteLogo; footerLogo.classList.remove('hidden'); if(defFooter) defFooter.classList.add('hidden'); }
                }

                // Dynamic Branding
                if(data.siteNameEn) {
                    setText('siteNameEnNav', data.siteNameEn);
                    setText('siteNameEnFooter', data.siteNameEn);
                }
                if(data.siteNameUr) {
                    setText('siteNameUrNav', data.siteNameUr);
                    setText('siteNameUrFooter', data.siteNameUr);
                }
                
                if(data.contactAddress) document.getElementById('footerAddress').innerText = data.contactAddress.split('\n')[0];
                if(data.contactWhatsApp) {
                    document.getElementById('footerPhone').innerText = data.contactWhatsApp;
                    document.getElementById('waLink').href = `https://wa.me/${data.contactWhatsApp.replace(/[^0-9]/g, '')}?text=Hello,%20I%20need%20legal%20consultation`;
                }
                if(data.footerCopyright) document.getElementById('footerCopyrightEl').innerText = data.footerCopyright;
            }
        });
    </script>
</body>
</html>
