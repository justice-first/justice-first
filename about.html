<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <!-- Service Worker KILL-SWITCH -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) { registration.unregister(); }
            });
        }
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="metaTitle">About Our Legacy | JUSTICE FIRST LAW ASSOCIATES</title>
    <meta name="description" id="metaDesc" content="Learn about Justice First Law Associates, our history, mission, and vision in Muzaffarabad, Azad Kashmir.">
    <link rel="icon" type="image/jpeg" href="favicon.jpg">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        midnight: "#0A0F1D",
                        obsidian: "#05070A",
                        gold: {
                            DEFAULT: "#D4AF37",
                            light: "#F4CF67",
                            dark: "#A68926",
                        },
                    },
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        serif: ['"Playfair Display"', 'serif'],
                        urdu: ['"Noto Nastaliq Urdu"', 'serif'],
                    }
                }
            }
        }
    </script>

    <style type="text/css">
        body { background-color: #05070A; color: #E2E8F0; }
        .glass-nav { background: rgba(5, 7, 10, 0.8); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .urdu-text { direction: rtl; line-height: 2.2; font-family: 'Noto Nastaliq Urdu', serif; }
        .premium-btn { background: linear-gradient(90deg, #D4AF37, #F4CF67, #D4AF37); background-size: 200% auto; transition: 0.5s; }
        .premium-btn:hover { background-position: right center; }
    </style>
</head>

<body class="font-sans antialiased">

    <!-- Header / Nav -->
    <nav id="mainNav" class="fixed top-0 w-full z-[1000] glass-nav py-4">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <a href="/" class="flex items-center space-x-4">
                <img id="siteLogoNav" src="justice_first_logo_1777690009627.png" alt="Logo" class="w-10 h-10 object-contain">
                <div class="flex flex-col">
                    <span id="siteNameEnNav" class="text-lg md:text-xl font-serif font-bold text-white tracking-tight uppercase">Justice First</span>
                    <span id="siteNameUrNav" class="text-[8px] uppercase tracking-[0.2em] text-gold font-bold">Law Associates</span>
                </div>
            </a>
            <div class="hidden lg:flex items-center space-x-10 text-xs font-bold uppercase tracking-widest">
                <a href="/" class="text-gray-400 hover:text-white transition-colors">Home</a>
                <a href="about" class="text-gold border-b border-gold pb-1">About</a>
                <a href="services" class="text-gray-400 hover:text-white transition-colors">Services</a>
                <a href="team" class="text-gray-400 hover:text-white transition-colors">Team</a>
                <a href="contact" class="premium-btn text-obsidian px-7 py-2 rounded-full">Consultation</a>
            </div>
        </div>
    </nav>

    <!-- Subpage Hero -->
    <header class="pt-40 pb-20 px-6 bg-gradient-to-b from-midnight to-obsidian border-b border-white/5">
        <div class="max-w-7xl mx-auto text-center relative z-10">
            <h1 id="aboutTitleEn" class="text-5xl md:text-8xl font-serif font-bold text-white mb-6">Our Legacy</h1>
            <p id="aboutTitleUr" class="urdu-text text-3xl md:text-5xl text-gold-light"></p>
        </div>
    </header>

    <!-- Content -->
    <section class="py-24 px-6">
        <div class="max-w-7xl mx-auto">
            <div class="grid lg:grid-cols-2 gap-20 items-start">
                <div class="space-y-12">
                    <div class="relative pl-10 border-l-4 border-gold/30">
                        <h2 class="text-3xl md:text-5xl font-serif font-bold text-white mb-8">A Journey of Justice</h2>
                        <p id="aboutStoryEn" class="text-lg md:text-xl text-gray-400 leading-relaxed font-light italic"></p>
                    </div>
                    <div id="aboutStoryUr" class="urdu-text text-2xl md:text-4xl text-gray-300 bg-white/5 p-10 rounded-[2.5rem] border border-white/10 shadow-2xl leading-relaxed"></div>
                </div>

                <div class="space-y-12">
                    <img id="aboutImgPreview" src="" alt="Firm Story" class="rounded-[2.5rem] shadow-2xl w-full aspect-[4/3] object-cover border border-white/10">
                    <div class="grid sm:grid-cols-2 gap-8">
                        <div class="bg-white/5 p-10 rounded-[2rem] border border-white/10">
                            <h4 class="text-gold font-bold uppercase tracking-[0.3em] text-[10px] mb-6">Our Mission</h4>
                            <p id="aboutMission" class="text-gray-400 text-sm leading-relaxed font-medium"></p>
                        </div>
                        <div class="bg-white/5 p-10 rounded-[2rem] border border-white/10">
                            <h4 class="text-white font-bold uppercase tracking-[0.3em] text-[10px] mb-6">Our Vision</h4>
                            <p id="aboutVision" class="text-gray-400 text-sm leading-relaxed font-medium"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-obsidian border-t border-white/5 pt-20 pb-12 px-6">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center text-center md:text-left gap-10">
            <div>
                <div class="flex items-center space-x-4 mb-6 justify-center md:justify-start">
                    <img id="siteLogoFooter" src="justice_first_logo_1777690009627.png" class="w-10 h-10" alt="Logo">
                    <div class="flex flex-col">
                        <span id="siteNameEnFooter" class="text-xl font-bold text-white uppercase tracking-tight">Justice First</span>
                        <span id="siteNameUrFooter" class="text-[8px] uppercase tracking-[0.2em] text-gold font-bold">Law Associates</span>
                    </div>
                </div>
                <p id="footerCopyrightEl" class="text-gray-500 text-[10px] uppercase tracking-widest font-bold">© 2024 Justice First Law Associates. All Rights Reserved.</p>
            </div>
            <div class="flex flex-col md:items-end text-[10px] uppercase tracking-[0.3em] font-bold text-gray-400">
                <p id="footerAddress" class="mb-4 text-center md:text-right max-w-sm"></p>
                <p id="footerPhone" class="text-gold text-lg"></p>
            </div>
        </div>
    </footer>

    <!-- WhatsApp -->
    <a href="#" id="waLink" target="_blank" class="fixed bottom-8 right-8 bg-[#25D366] text-white p-4 rounded-full shadow-2xl hover:scale-110 transition-all z-50">
        <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
    </a>

    <!-- Local Data Loader -->
    <script src="data.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            let data = window.justiceData;
            try {
                const response = await fetch('/api/data');
                if (response.ok) {
                    const cloudData = await response.json();
                    if (cloudData && Object.keys(cloudData).length > 0) data = cloudData;
                }
            } catch (err) {}

            if (!data) return;

            const setText = (id, text) => {
                const el = document.getElementById(id);
                if (el) el.innerText = text || '';
            };

            const checkUrdu = (el) => {
                if (!el) return;
                const text = el.innerText || el.textContent;
                if (!text || text.trim() === "") { el.style.display = 'none'; } else { el.style.display = 'block'; }
            };

            setText('siteNameEnNav', data.siteNameEn);
            setText('siteNameUrNav', data.siteNameUr);
            setText('siteNameEnFooter', data.siteNameEn);
            setText('siteNameUrFooter', data.siteNameUr);
            setText('footerAddress', data.footerAddress || data.contactAddress);
            setText('footerPhone', data.footerPhone || data.contactPhone);
            setText('footerCopyrightEl', `© ${new Date().getFullYear()} ${data.siteNameEn}. All Rights Reserved.`);

            const waPhone = (data.contactWhatsApp || data.footerPhone || "").replace(/[^0-9]/g, '');
            if (waPhone) document.getElementById('waLink').href = `https://wa.me/${waPhone}`;

            setText('aboutTitleEn', data.aboutTitleEn || 'Our Legacy');
            const aUr = document.getElementById('aboutTitleUr');
            if (aUr) { aUr.innerText = data.aboutTitleUr; checkUrdu(aUr); }
            
            setText('aboutStoryEn', data.aboutStoryEn);
            const asUr = document.getElementById('aboutStoryUr');
            if (asUr) { asUr.innerText = data.aboutStoryUr; checkUrdu(asUr); }

            setText('aboutMission', data.aboutMission);
            setText('aboutVision', data.aboutVision);
            if (data.aboutImage) document.getElementById('aboutImgPreview').src = data.aboutImage;
        });
    </script>
</body>
</html>
