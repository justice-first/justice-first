<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Service Worker KILL-SWITCH -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) { registration.unregister(); }
            });
        }
    </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login – Justice First</title>
    <link rel="icon" type="image/jpeg" href="favicon.jpg">

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
  </style>
</head>
<body class="min-h-[100dvh] flex items-center justify-center p-4">

  <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md transform transition-all">
    <div class="text-center mb-8">
      <div class="mx-auto w-12 h-12 bg-teal-100 rounded-full flex items-center justify-center mb-4">
        <i data-lucide="scale" class="w-6 h-6 text-teal-600"></i>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">Justice First</h1>
      <p class="text-sm text-gray-500 mt-2">Sign in to the Admin Dashboard</p>
    </div>

    <div id="errorMsg" class="hidden bg-red-50 border-l-4 border-red-500 text-red-700 p-4 mb-6 rounded text-sm flex items-center">
      <i data-lucide="alert-circle" class="w-4 h-4 mr-2"></i>
      Invalid credentials. Please try again.
    </div>

    <div class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">User ID</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <i data-lucide="user" class="h-4 w-4 text-gray-400"></i>
          </div>
          <input id="userid" type="text" placeholder="Enter your ID" class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500" onkeydown="if(event.key==='Enter')login()">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <i data-lucide="lock" class="h-4 w-4 text-gray-400"></i>
          </div>
          <input id="password" type="password" placeholder="••••••••" class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500" onkeydown="if(event.key==='Enter')login()">
        </div>
      </div>

      <button onclick="login()" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-medium py-2.5 rounded-lg transition-colors flex justify-center items-center mt-6">
        Sign In <i data-lucide="arrow-right" class="w-4 h-4 ml-2"></i>
      </button>
    </div>
    
    <div class="mt-8 text-center text-xs text-gray-400">
      &copy; 2024 Justice First Law Associates
    </div>
  </div>

  <script>
    lucide.createIcons();

    async function login() {
      const uid = document.getElementById('userid').value.trim();
      const pwd = document.getElementById('password').value;
      const btn = document.querySelector('button');
      
      btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 mr-2 animate-spin"></i> Authenticating...';
      lucide.createIcons();

      setTimeout(() => {
        if (uid === 'admin' && pwd === 'admin52274') {
          sessionStorage.setItem('jf_admin_auth', 'true');
          window.location.href = 'admin.html';
        } else {
          document.getElementById('errorMsg').classList.remove('hidden');
          btn.innerHTML = 'Sign In <i data-lucide="arrow-right" class="w-4 h-4 ml-2"></i>';
          lucide.createIcons();
        }
      }, 500); // Simulate network request for premium feel
    }
  </script>
</body>
</html>
