<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | JUSTICE FIRST LAW ASSOCIATES</title>
    <link rel="icon" type="image/jpeg" href="favicon.jpg">

    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Nastaliq+Urdu:wght@400;700&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: {
                            950: "#050B16",
                            900: "#0A1931",
                            800: "#1A1A2E",
                            700: "#1B3A6B",
                        },
                        gold: {
                            600: "#B89640",
                            500: "#C9A84C",
                            400: "#D4B96E",
                            300: "#E2B96F",
                        }
                    },
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        sans: ['"Inter"', 'sans-serif'],
                        urdu: ['"Noto Nastaliq Urdu"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        html, body { 
            background-color: #F8F7F4; 
            color: #1A1A2E; 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            width: 100%;
        }
        
        .urdu-text {
            font-family: 'Noto Nastaliq Urdu', sans-serif;
            direction: rtl;
            text-align: right;
            line-height: 2.5;
            padding-top: 0.5em;
            padding-bottom: 0.5em;
            display: block;
        }

        .hero-premium {
            background: linear-gradient(135deg, #0A1931 0%, #050B16 100%);
        }

        .contact-card-premium {
            background: white;
            transition: all 0.4s ease;
        }
        
        .contact-card-premium:hover {
            transform: translateY(-8px);
            box-shadow: 0 30px 60px -12px rgba(10, 25, 49, 0.15);
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="bg-navy-950 border-b border-white/10 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <a href="index.html" class="flex items-center space-x-3 group">
                    <div id="siteLogoNavContainer" class="w-10 h-10 bg-gold-500 rounded flex items-center justify-center overflow-hidden shadow-lg">
                        <img id="siteLogoNav" src="" alt="Logo" class="max-w-full max-h-full object-contain hidden">
                        <svg id="defaultLogoNav" class="w-6 h-6 text-navy-900" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3zm6.82 10.31L12 17l-6.82-3.69v-3.13L12 13.5l6.82-3.19v3z"/></svg>
                    </div>
                    <div class="flex flex-col min-w-0">
                        <span id="siteNameEnNav" class="font-serif text-lg font-bold text-white tracking-wide uppercase truncate">Justice First</span>
                        <span id="siteNameUrNav" class="text-[8px] uppercase tracking-[0.2em] text-gold-400 font-bold leading-tight truncate">Law Associates</span>
                    </div>
                </a>
                <div class="hidden lg:flex items-center space-x-10">
                    <a href="index.html" class="text-gray-300 hover:text-gold-500 font-medium text-sm uppercase tracking-widest transition-colors">Home</a>
                    <a href="about.html" class="text-gray-300 hover:text-gold-500 font-medium text-sm uppercase tracking-widest transition-colors">About</a>
                    <a href="services.html" class="text-gray-300 hover:text-gold-500 font-medium text-sm uppercase tracking-widest transition-colors">Services</a>
                    <a href="team.html" class="text-gray-300 hover:text-gold-500 font-medium text-sm uppercase tracking-widest transition-colors">Team</a>
                    <a href="contact.html" class="text-gold-500 font-bold text-sm uppercase tracking-widest border-b-2 border-gold-500 pb-1">Contact</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Subpage Hero -->
    <header class="hero-premium py-10 md:py-16 px-4 relative overflow-hidden">
        <div class="max-w-7xl mx-auto w-full text-center relative z-10">
            <h1 id="contactTitleEn" class="text-3xl md:text-5xl lg:text-7xl font-serif text-white font-bold mb-4">Get In Touch</h1>
        </div>
    </header>

    <!-- Contact Grid -->
    <section class="py-10 md:py-16 px-4 max-w-7xl mx-auto w-full">
        <div class="grid lg:grid-cols-3 gap-12">
            <!-- Contact Info Cards -->
            <div class="lg:col-span-1 space-y-8">
                <div class="contact-card-premium p-6 md:p-10 rounded-3xl border border-gray-50 shadow-xl">
                    <div class="w-14 h-14 bg-navy-900 text-gold-500 rounded-xl flex items-center justify-center mb-8 shadow-lg">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path></svg>
                    </div>
                    <h3 class="text-2xl font-serif text-navy-900 font-bold mb-4">Our Chambers</h3>
                    <p id="contactAddress" class="text-gray-600 leading-relaxed"></p>
                    <a href="#" id="mapLink" target="_blank" class="inline-block mt-6 text-gold-600 font-bold uppercase tracking-widest text-xs border-b-2 border-gold-500 pb-1">Open in Google Maps</a>
                </div>

                <div class="contact-card-premium p-6 md:p-10 rounded-3xl border border-gray-50 shadow-xl">
                    <div class="w-14 h-14 bg-navy-900 text-gold-500 rounded-xl flex items-center justify-center mb-8 shadow-lg">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                    </div>
                    <h3 class="text-2xl font-serif text-navy-900 font-bold mb-4">Direct Contact</h3>
                    <p id="contactWhatsApp" class="text-gold-600 text-xl font-bold mb-2"></p>
                    <p id="contactEmail" class="text-gray-600 mb-6"></p>
                    
                    <div class="border-t border-gray-100 pt-6">
                        <h4 class="text-xs font-bold uppercase tracking-widest text-navy-900 mb-3">Working Hours</h4>
                        <p id="contactHours" class="text-gray-500 text-sm whitespace-pre-line"></p>
                    </div>
                </div>
            </div>

            <!-- Modern Form -->
            <div class="lg:col-span-2 bg-white p-8 md:p-16 rounded-[2rem] md:rounded-[3rem] shadow-2xl border border-gray-50 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-32 h-32 bg-gold-500/5 rounded-bl-full"></div>
                <h3 class="text-3xl font-serif text-navy-900 font-bold mb-12">Send Message</h3>
                
                <form class="space-y-8">
                    <div class="grid md:grid-cols-2 gap-8">
                        <div>
                            <label class="block text-navy-900 font-bold uppercase tracking-widest text-[10px] mb-3">Full Name</label>
                            <input type="text" class="w-full bg-gray-50 border-0 border-b-2 border-gray-100 focus:border-gold-500 focus:ring-0 px-0 py-3 text-lg transition-all" placeholder="Enter your name">
                        </div>
                        <div>
                            <label class="block text-navy-900 font-bold uppercase tracking-widest text-[10px] mb-3">Phone Number</label>
                            <input type="tel" class="w-full bg-gray-50 border-0 border-b-2 border-gray-100 focus:border-gold-500 focus:ring-0 px-0 py-3 text-lg transition-all" placeholder="+92 ...">
                        </div>
                    </div>
                    <div>
                        <label class="block text-navy-900 font-bold uppercase tracking-widest text-[10px] mb-3">Case Category</label>
                        <select class="w-full bg-gray-50 border-0 border-b-2 border-gray-100 focus:border-gold-500 focus:ring-0 px-0 py-3 text-lg transition-all">
                            <option>Criminal Defense</option>
                            <option>Civil Litigation</option>
                            <option>Family Law</option>
                            <option>Taxation / Corporate</option>
                            <option>Other Legal Matter</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-navy-900 font-bold uppercase tracking-widest text-[10px] mb-3">Message Detail</label>
                        <textarea class="w-full bg-gray-50 border-0 border-b-2 border-gray-100 focus:border-gold-500 focus:ring-0 px-0 py-3 text-lg transition-all" rows="4" placeholder="Briefly describe your situation..."></textarea>
                    </div>
                    <button type="submit" class="w-full bg-navy-900 text-white py-5 rounded-2xl font-bold uppercase tracking-widest hover:bg-gold-500 hover:text-navy-900 transition-all shadow-xl shadow-navy-900/10">Submit Request</button>
                </form>
            </div>
        </div>
    </section>

    <!-- Map Section -->
    <section class="h-[400px] w-full bg-gray-100 relative grayscale hover:grayscale-0 transition-all duration-700">
        <iframe 
            id="contactMap"
            src="" 
            class="w-full h-full border-0" 
            allowfullscreen="" 
            loading="lazy" 
            referrerpolicy="no-referrer-when-downgrade">
        </iframe>
    </section>

    <!-- Footer -->
    <footer class="bg-navy-950 text-white py-10 md:py-16 px-4 border-t border-white/5">
        <div class="max-w-7xl mx-auto w-full">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-12 text-center md:text-left">
                <div>
                    <h3 class="font-serif text-3xl text-gold-500 mb-8 tracking-wide flex items-center space-x-3 justify-center md:justify-start">
                        <div id="siteLogoFooterContainer" class="w-10 h-10 bg-gold-500 rounded flex items-center justify-center overflow-hidden">
                            <img id="siteLogoFooter" src="" alt="Logo" class="max-w-full max-h-full object-contain hidden">
                            <svg id="defaultLogoFooter" class="w-6 h-6 text-navy-900" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3zm6.82 10.31L12 17l-6.82-3.69v-3.13L12 13.5l6.82-3.19v3z"/></svg>
                        </div>
                        <div class="flex flex-col text-left">
                            <span id="siteNameEnFooter" class="text-xl font-bold text-white uppercase leading-none">Justice First</span>
                            <span id="siteNameUrFooter" class="text-[8px] uppercase tracking-[0.2em] text-gold-400 font-bold mt-1">Law Associates</span>
                        </div>
                    </h3>
                    <p id="footerCopyrightEl" class="text-gray-400 text-sm">© 2024 Justice First Law Associates. All Rights Reserved.</p>
                </div>
                <div>
                    <h4 class="text-white font-bold uppercase tracking-widest text-xs mb-8">Navigation</h4>
                    <div class="flex flex-wrap justify-center md:justify-start gap-6 text-gray-400">
                        <a href="index.html" class="hover:text-gold-500 transition-colors">Home</a>
                        <a href="about.html" class="hover:text-gold-500 transition-colors">About</a>
                        <a href="services.html" class="hover:text-gold-500 transition-colors">Services</a>
                        <a href="team.html" class="hover:text-gold-500 transition-colors">Team</a>
                    </div>
                </div>
                <div>
                    <h4 class="text-white font-bold uppercase tracking-widest text-xs mb-8">Office</h4>
                    <p id="footerAddress" class="text-gray-400 text-sm leading-relaxed"></p>
                    <p id="footerPhone" class="text-gold-500 font-bold mt-4"></p>
                </div>
            </div>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            let savedData = JSON.parse(localStorage.getItem('justiceFirstDataV2')) || {};
            try {
                const res = await fetch('data.json?v=' + new Date().getTime());
                const fetchedData = await res.json();
                if (fetchedData && Object.keys(fetchedData).length > 0) {
                    savedData = fetchedData;
                    localStorage.setItem('justiceFirstDataV2', JSON.stringify(fetchedData));
                }
            } catch (e) { console.error('Fetch error:', e); }
            const data = { ...savedData };

            // Utility functions
            const setText = (id, text) => {
                const el = document.getElementById(id);
                if (el) el.innerText = text || '';
            };

            // Global branding
            if (data.siteNameEn) { setText('siteNameEnNav', data.siteNameEn); setText('siteNameEnFooter', data.siteNameEn); }
            if (data.siteNameUr) { setText('siteNameUrNav', data.siteNameUr); setText('siteNameUrFooter', data.siteNameUr); }
            
            // Logos
            if (data.siteLogo) {
                const navLogo = document.getElementById('siteLogoNav');
                const footerLogo = document.getElementById('siteLogoFooter');
                const navDefault = document.getElementById('defaultLogoNav');
                const footerDefault = document.getElementById('defaultLogoFooter');
                if (navLogo) { navLogo.src = data.siteLogo; navLogo.classList.remove('hidden'); if(navDefault) navDefault.classList.add('hidden'); }
                if (footerLogo) { footerLogo.src = data.siteLogo; footerLogo.classList.remove('hidden'); if(footerDefault) footerDefault.classList.add('hidden'); }
            }

            setText('footerAddress', data.footerAddress || data.contactAddress || '');
            setText('footerCopyrightEl', data.footerCopyright || `© ${new Date().getFullYear()} Justice First Law Associates. All Rights Reserved.`);

            const phone = data.footerPhone || data.contactPhone || '';
            const waPhone = (data.contactWhatsApp || phone).replace(/[^0-9]/g, '');
            if (waPhone) {
                const waUrl = `https://wa.me/${waPhone}?text=Hello,%20I%20need%20legal%20consultation`;
                if (document.getElementById('waLink')) document.getElementById('waLink').href = waUrl;
                setText('footerPhone', data.contactWhatsApp || phone);
                setText('contactWhatsApp', data.contactWhatsApp || phone);
            }

            // Contact Info
            setText('contactAddress', data.contactAddress || '');
            setText('contactEmail', data.contactEmail || '');
            setText('contactHours', data.contactHours || '');
            
            if(data.contactMapLink) {
                const mapFrame = document.getElementById('contactMap');
                if(mapFrame) mapFrame.src = data.contactMapLink;
                const mapBtn = document.getElementById('mapLink');
                if(mapBtn) mapBtn.href = data.contactMapLink;
            }

            // SEO
            if (data.metaTitleContactPage) document.title = data.metaTitleContactPage;
            if (data.metaDescriptionContact) {
                const metaDesc = document.querySelector('meta[name="description"]');
                if (metaDesc) metaDesc.content = data.metaDescriptionContact;
            }
        });
    </script>
</body>
</html>
