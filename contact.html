<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="metaTitle">Contact Us | JUSTICE FIRST LAW ASSOCIATES</title>
    <meta name="description" id="metaDesc" content="Contact Justice First Law Associates for expert legal consultation in Muzaffarabad.">
    <link rel="icon" type="image/jpeg" href="favicon.jpg">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        midnight: "#0A0F1D",
                        obsidian: "#05070A",
                        gold: {
                            DEFAULT: "#D4AF37",
                            light: "#F4CF67",
                            dark: "#A68926",
                        },
                    },
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        serif: ['"Playfair Display"', 'serif'],
                        urdu: ['"Noto Nastaliq Urdu"', 'serif'],
                    }
                }
            }
        }
    </script>

    <style type="text/css">
        body {
            background-color: #05070A;
            color: #E2E8F0;
        }

        .glass-nav {
            background: rgba(5, 7, 10, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .premium-btn {
            background: linear-gradient(90deg, #D4AF37, #F4CF67, #D4AF37);
            background-size: 200% auto;
            transition: 0.5s;
        }

        input, textarea, select {
            background: rgba(255, 255, 255, 0.03) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus, select:focus {
            border-color: #D4AF37 !important;
            background: rgba(255, 255, 255, 0.05) !important;
            outline: none;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
        }
    </style>
</head>

<body class="font-sans antialiased">

    <!-- Header / Nav -->
    <nav id="mainNav" class="fixed top-0 w-full z-[1000] glass-nav py-4">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-4">
                <img id="siteLogoNav" src="justice_first_logo_1777690009627.png" alt="Logo" class="w-10 h-10 object-contain">
                <div class="flex flex-col">
                    <span id="siteNameEnNav" class="text-lg md:text-xl font-serif font-bold text-white tracking-tight uppercase">Justice First</span>
                    <span id="siteNameUrNav" class="text-[8px] uppercase tracking-[0.2em] text-gold font-bold">Law Associates</span>
                </div>
            </a>
            <div class="hidden lg:flex items-center space-x-10 text-xs font-bold uppercase tracking-widest">
                <a href="index.html" class="text-gray-400 hover:text-white transition-colors">Home</a>
                <a href="about.html" class="text-gray-400 hover:text-white transition-colors">About</a>
                <a href="services.html" class="text-gray-400 hover:text-white transition-colors">Services</a>
                <a href="team.html" class="text-gray-400 hover:text-white transition-colors">Team</a>
                <a href="contact.html" class="text-gold border-b border-gold pb-1">Contact</a>
            </div>
        </div>
    </nav>

    <!-- Subpage Hero -->
    <header class="pt-40 pb-20 px-6 bg-gradient-to-b from-midnight to-obsidian border-b border-white/5">
        <div class="max-w-7xl mx-auto text-center">
            <h1 id="contactTitleEn" class="text-5xl md:text-8xl font-serif font-bold text-white mb-6">Contact</h1>
            <p class="text-gold font-bold uppercase tracking-[0.5em] text-[10px]">Secure & Private Consultation</p>
        </div>
    </header>

    <!-- Contact Content -->
    <section class="py-24 px-6">
        <div class="max-w-7xl mx-auto">
            <div class="grid lg:grid-cols-3 gap-16">
                <!-- Info -->
                <div class="space-y-8">
                    <div class="bg-white/5 border border-white/10 p-12 rounded-[2.5rem] transform hover:-translate-y-2 transition-all">
                        <div class="w-12 h-12 bg-gold/10 text-gold rounded-2xl flex items-center justify-center mb-8">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path></svg>
                        </div>
                        <h3 class="text-2xl font-serif text-white font-bold mb-4">Chambers</h3>
                        <p id="contactAddress" class="text-gray-400 text-sm leading-relaxed font-medium mb-8"></p>
                        <a href="#" id="mapLink" target="_blank" class="text-gold font-bold uppercase tracking-widest text-[10px] border-b border-gold/30 pb-1">Navigate on Maps</a>
                    </div>

                    <div class="bg-white/5 border border-white/10 p-12 rounded-[2.5rem] transform hover:-translate-y-2 transition-all">
                        <div class="w-12 h-12 bg-gold/10 text-gold rounded-2xl flex items-center justify-center mb-8">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                        </div>
                        <h3 class="text-2xl font-serif text-white font-bold mb-4">Direct</h3>
                        <p id="contactWhatsApp" class="text-gold text-xl font-black mb-2"></p>
                        <p id="contactEmail" class="text-gray-400 text-sm font-medium"></p>
                        <div class="mt-8 pt-8 border-t border-white/5">
                            <span class="text-[10px] uppercase tracking-widest text-gray-500 block mb-2">Availability</span>
                            <p id="contactHours" class="text-gray-400 text-xs font-bold leading-relaxed"></p>
                        </div>
                    </div>
                </div>

                <!-- Form -->
                <div class="lg:col-span-2 bg-gradient-to-br from-white/5 to-transparent p-12 md:p-20 rounded-[3rem] border border-white/10 shadow-2xl">
                    <h3 class="text-3xl md:text-5xl font-serif text-white font-bold mb-12">Submit Inquiry</h3>
                    <form class="space-y-10">
                        <div class="grid md:grid-cols-2 gap-10">
                            <div class="space-y-3">
                                <label class="text-[10px] font-bold uppercase tracking-widest text-gold ml-1">Your Name</label>
                                <input type="text" class="w-full px-6 py-5 rounded-2xl" placeholder="Full name">
                            </div>
                            <div class="space-y-3">
                                <label class="text-[10px] font-bold uppercase tracking-widest text-gold ml-1">Phone</label>
                                <input type="tel" class="w-full px-6 py-5 rounded-2xl" placeholder="+92 ...">
                            </div>
                        </div>
                        <div class="space-y-3">
                            <label class="text-[10px] font-bold uppercase tracking-widest text-gold ml-1">Area of Practice</label>
                            <select class="w-full px-6 py-5 rounded-2xl appearance-none">
                                <option>Criminal Defense</option>
                                <option>Civil Litigation</option>
                                <option>Constitutional Law</option>
                                <option>Family Law</option>
                                <option>Other</option>
                            </select>
                        </div>
                        <div class="space-y-3">
                            <label class="text-[10px] font-bold uppercase tracking-widest text-gold ml-1">Case Brief</label>
                            <textarea class="w-full px-6 py-5 rounded-2xl" rows="5" placeholder="Tell us about your case..."></textarea>
                        </div>
                        <button type="submit" class="premium-btn w-full text-obsidian py-6 rounded-2xl font-black uppercase tracking-widest text-sm shadow-2xl">Request Counsel</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- Map -->
    <section class="h-[500px] w-full border-t border-white/5 grayscale opacity-50 hover:grayscale-0 hover:opacity-100 transition-all duration-1000">
        <iframe id="contactMap" src="" class="w-full h-full border-0" allowfullscreen="" loading="lazy"></iframe>
    </section>

    <!-- Footer -->
    <footer class="bg-obsidian pt-20 pb-12 px-6">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center text-center md:text-left gap-10">
            <div>
                <div class="flex items-center space-x-4 mb-6 justify-center md:justify-start">
                    <img id="siteLogoFooter" src="justice_first_logo_1777690009627.png" class="w-10 h-10" alt="Logo">
                    <div class="flex flex-col">
                        <span id="siteNameEnFooter" class="text-xl font-bold text-white uppercase tracking-tight">Justice First</span>
                        <span id="siteNameUrFooter" class="text-[8px] uppercase tracking-[0.2em] text-gold font-bold">Law Associates</span>
                    </div>
                </div>
                <p id="footerCopyrightEl" class="text-gray-500 text-[10px] uppercase tracking-widest font-bold">© 2024 Justice First Law Associates. All Rights Reserved.</p>
            </div>
            <div class="flex flex-col md:items-end text-[10px] uppercase tracking-[0.3em] font-bold text-gray-400">
                <p id="footerAddress" class="mb-4 text-center md:text-right max-w-sm"></p>
                <p id="footerPhone" class="text-gold text-lg"></p>
            </div>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            let savedData = JSON.parse(localStorage.getItem('justiceFirstDataV2')) || {};
            try {
                const res = await fetch('data.json?v=' + new Date().getTime());
                const fetchedData = await res.json();
                if (fetchedData && Object.keys(fetchedData).length > 0) {
                    savedData = fetchedData;
                    localStorage.setItem('justiceFirstDataV2', JSON.stringify(fetchedData));
                }
            } catch (e) { console.error('Fetch error:', e); }
            const data = savedData;

            const setText = (id, text) => {
                const el = document.getElementById(id);
                if (el) el.innerText = text || '';
            };

            setText('siteNameEnNav', data.siteNameEn);
            setText('siteNameUrNav', data.siteNameUr);
            setText('siteNameEnFooter', data.siteNameEn);
            setText('siteNameUrFooter', data.siteNameUr);
            setText('footerAddress', data.footerAddress || data.contactAddress);
            setText('footerPhone', data.footerPhone || data.contactPhone);
            setText('footerCopyrightEl', `© ${new Date().getFullYear()} ${data.siteNameEn}. All Rights Reserved.`);

            setText('contactAddress', data.contactAddress);
            setText('contactEmail', data.contactEmail);
            setText('contactWhatsApp', data.contactWhatsApp || data.contactPhone);
            setText('contactHours', data.contactHours);
            
            if(data.contactMapLink) {
                document.getElementById('contactMap').src = data.contactMapLink;
                document.getElementById('mapLink').href = data.contactMapLink;
            }
        });
    </script>
</body>
</html>
