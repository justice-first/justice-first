<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="metaTitle">Legal Expertise | JUSTICE FIRST LAW ASSOCIATES</title>
    <link rel="icon" type="image/jpeg" href="favicon.jpg">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        midnight: "#0A0F1D",
                        obsidian: "#05070A",
                        gold: {
                            DEFAULT: "#D4AF37",
                            light: "#F4CF67",
                            dark: "#A68926",
                        },
                    },
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        serif: ['"Playfair Display"', 'serif'],
                        urdu: ['"Noto Nastaliq Urdu"', 'serif'],
                    }
                }
            }
        }
    </script>

    <style type="text/css">
        body { background-color: #05070A; color: #E2E8F0; }
        .glass-nav { background: rgba(5, 7, 10, 0.8); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .urdu-text { direction: rtl; line-height: 2.2; font-family: 'Noto Nastaliq Urdu', serif; }
        .service-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .service-card:hover { border-color: rgba(212, 175, 55, 0.3); transform: translateY(-10px); }
        .premium-btn { background: linear-gradient(90deg, #D4AF37, #F4CF67, #D4AF37); background-size: 200% auto; transition: 0.5s; }
    </style>
</head>

<body class="font-sans antialiased">

    <!-- Header / Nav -->
    <nav id="mainNav" class="fixed top-0 w-full z-[1000] glass-nav py-4">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-4">
                <img id="siteLogoNav" src="justice_first_logo_1777690009627.png" alt="Logo" class="w-10 h-10 object-contain">
                <div class="flex flex-col">
                    <span id="siteNameEnNav" class="text-lg md:text-xl font-serif font-bold text-white tracking-tight uppercase">Justice First</span>
                    <span id="siteNameUrNav" class="text-[8px] uppercase tracking-[0.2em] text-gold font-bold">Law Associates</span>
                </div>
            </a>
            <div class="hidden lg:flex items-center space-x-10 text-xs font-bold uppercase tracking-widest">
                <a href="index.html" class="text-gray-400 hover:text-white transition-colors">Home</a>
                <a href="about.html" class="text-gray-400 hover:text-white transition-colors">About</a>
                <a href="services.html" class="text-gold border-b border-gold pb-1">Services</a>
                <a href="team.html" class="text-gray-400 hover:text-white transition-colors">Team</a>
                <a href="contact.html" class="premium-btn text-obsidian px-7 py-2 rounded-full">Consultation</a>
            </div>
        </div>
    </nav>

    <!-- Subpage Hero -->
    <header class="pt-40 pb-20 px-6 bg-gradient-to-b from-midnight to-obsidian border-b border-white/5 relative overflow-hidden">
        <div class="max-w-7xl mx-auto text-center">
            <h1 id="servicesTitleEn" class="text-5xl md:text-8xl font-serif font-bold text-white mb-6">Expertise</h1>
            <p id="servicesTitleUr" class="urdu-text text-3xl md:text-5xl text-gold-light"></p>
        </div>
    </header>

    <!-- Services Grid -->
    <section class="py-24 px-6">
        <div class="max-w-7xl mx-auto">
            <div id="dynamicServicesGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Data Injected -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-obsidian border-t border-white/5 pt-20 pb-12 px-6">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center text-center md:text-left gap-10">
            <div>
                <div class="flex items-center space-x-4 mb-6 justify-center md:justify-start">
                    <img id="siteLogoFooter" src="justice_first_logo_1777690009627.png" class="w-10 h-10" alt="Logo">
                    <div class="flex flex-col">
                        <span id="siteNameEnFooter" class="text-xl font-bold text-white uppercase tracking-tight">Justice First</span>
                        <span id="siteNameUrFooter" class="text-[8px] uppercase tracking-[0.2em] text-gold font-bold">Law Associates</span>
                    </div>
                </div>
                <p id="footerCopyrightEl" class="text-gray-500 text-[10px] uppercase tracking-widest font-bold">© 2024 Justice First Law Associates. All Rights Reserved.</p>
            </div>
            <div class="flex flex-col md:items-end text-[10px] uppercase tracking-[0.3em] font-bold text-gray-400">
                <p id="footerAddress" class="mb-4 text-center md:text-right max-w-sm"></p>
                <p id="footerPhone" class="text-gold text-lg"></p>
            </div>
        </div>
    </footer>

    <!-- Local Data Loader -->
    <script src="data.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            let data = window.justiceData;
            try {
                const response = await fetch('/api/data');
                if (response.ok) {
                    const cloudData = await response.json();
                    if (cloudData && Object.keys(cloudData).length > 0) data = cloudData;
                }
            } catch (err) {}

            if (!data) return;

            const setText = (id, text) => {
                const el = document.getElementById(id);
                if (el) el.innerText = text || '';
            };

            setText('siteNameEnNav', data.siteNameEn);
            setText('siteNameUrNav', data.siteNameUr);
            setText('siteNameEnFooter', data.siteNameEn);
            setText('siteNameUrFooter', data.siteNameUr);
            setText('footerAddress', data.footerAddress || data.contactAddress);
            setText('footerPhone', data.footerPhone || data.contactPhone);
            setText('footerCopyrightEl', `© ${new Date().getFullYear()} ${data.siteNameEn}. All Rights Reserved.`);

            setText('servicesTitleEn', data.servicesTitleEn || 'Expertise');
            setText('servicesTitleUr', data.servicesTitleUr);

            const services = data.services || [];
            const sGrid = document.getElementById('dynamicServicesGrid');
            if (sGrid) {
                sGrid.innerHTML = services.map(srv => `
                    <div class="service-card p-12 rounded-[2.5rem] flex flex-col group h-full">
                        <div class="w-16 h-16 bg-white/5 text-gold rounded-2xl flex items-center justify-center mb-10">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"></path></svg>
                        </div>
                        <h3 class="text-3xl font-serif text-white mb-3 font-bold group-hover:text-gold transition-colors">${srv.titleEn}</h3>
                        ${srv.titleUr ? `<p class="urdu-text text-xl text-gold-light mb-8">${srv.titleUr}</p>` : ''}
                        <p class="text-gray-500 mb-10 flex-grow leading-relaxed font-medium line-clamp-3">${srv.desc}</p>
                        <a href="service-detail.html?id=${srv.id}" class="inline-flex items-center text-xs font-bold uppercase tracking-widest text-gold hover:text-white transition-colors">
                            Explore Expertise <svg class="w-4 h-4 ml-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
                        </a>
                    </div>
                `).join('');
            }
        });
    </script>
</body>
</html>
